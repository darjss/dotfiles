<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <!-- Default sans-serif: Onest -->
  <match target="pattern">
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Onest</string></edit>
  </match>

  <!-- Default serif: keep DejaVu Serif -->
  <match target="pattern">
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="assign" binding="strong"><string>DejaVu Serif</string></edit>
  </match>

  <!-- Default monospace: FiraCode Nerd Font Mono -->
  <match target="pattern">
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="assign" binding="strong"><string>FiraCode Nerd Font Mono</string></edit>
  </match>

  <!-- Alias common generic families -->
  <match target="pattern">
    <test name="family"><string>system-ui</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Onest</string></edit>
  </match>

  <match target="pattern">
    <test name="family"><string>-apple-system</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Onest</string></edit>
  </match>

  <match target="pattern">
    <test name="family"><string>Inter</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Onest</string></edit>
  </match>

  <match target="pattern">
    <test name="family"><string>Helvetica</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Onest</string></edit>
  </match>

  <match target="pattern">
    <test name="family"><string>Arial</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Onest</string></edit>
  </match>

  <match target="pattern">
    <test name="family"><string>JetBrains Mono</string></test>
    <edit name="family" mode="assign" binding="strong"><string>FiraCode Nerd Font Mono</string></edit>
  </match>

</fontconfig>
